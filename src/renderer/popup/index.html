<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ItsyHome</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="popup-body">
    <div id="detail-panel">
      <div id="detail-header">
        <button id="btn-back" title="Back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 12 5 8l5-4"/>
          </svg>
        </button>
        <span id="detail-icon"></span>
        <span id="detail-title"></span>
      </div>
      <div id="detail-list"></div>
    </div>
    <div id="main-panel">
      <div id="top-bar">
        <div id="top-left">
          <span id="top-dot"></span>
          <span id="top-env-name">–</span>
          <span id="badge-notifications" class="top-badge badge-notify" title="Notifiche">0</span>
          <span id="badge-updates"       class="top-badge badge-update" title="Aggiornamenti disponibili">0</span>
        </div>
        <div id="top-right">
          <button id="btn-open-ha" title="Apri Home Assistant">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 2a6 6 0 1 0 0 12A6 6 0 0 0 8 2zm0 0c-1.5 2-2 3.5-2 6s.5 4 2 6m0-12c1.5 2 2 3.5 2 6s-.5 4-2 6M2 8h12"/>
            </svg>
          </button>
          <button id="btn-cameras" title="Telecamere">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 5.5A1.5 1.5 0 0 1 3.5 4H5l1-1.5h4L11 4h1.5A1.5 1.5 0 0 1 14 5.5v6A1.5 1.5 0 0 1 12.5 13h-9A1.5 1.5 0 0 1 2 11.5v-6zM8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
            </svg>
          </button>
          <button id="btn-search" class="icon-btn" title="Cerca (Ctrl+F)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7" cy="7" r="4"/>
              <path d="m10 10 3 3"/>
            </svg>
          </button>
          <button id="btn-reconnect" title="Reconnect">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3M13.5 2v3.5H10"/>
            </svg>
          </button>
          <button id="btn-settings" title="Impostazioni">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.3 2.2 6 3.5a5 5 0 0 0-1.4.8L3.3 3.7 1.7 6.3l.9.9a5.1 5.1 0 0 0 0 1.6l-.9.9 1.6 2.6 1.3-.6a5 5 0 0 0 1.4.8l.3 1.3h3.4l.3-1.3a5 5 0 0 0 1.4-.8l1.3.6 1.6-2.6-.9-.9a5.1 5.1 0 0 0 0-1.6l.9-.9-1.6-2.6-1.3.6A5 5 0 0 0 9.7 3.5l-.3-1.3Z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
          </button>
          <button id="btn-hide" title="Nascondi nella tray">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l10 10M13 3 3 13"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="search-bar" class="search-bar hidden">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="4"/>
          <path d="m10 10 3 3"/>
        </svg>
        <input type="text" id="search-input" placeholder="Cerca dispositivo… (Esc per chiudere)" autocomplete="off" />
        <button id="btn-search-clear" class="icon-btn" title="Cancella ricerca">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3l10 10M13 3 3 13"/>
          </svg>
        </button>
      </div>
      <div id="menu-list"></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
